<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="generator" content="README-derived static site" />
    {{headMeta}}
    <link rel="stylesheet" href="{{siteCssHref}}" />
    {{analyticsConfig}}
    <script src="{{analyticsSrc}}" type="module"></script>
    <script src="{{siteUiSrc}}" type="module"></script>
  </head>
  <body>
    <div
      class="scroll-progress"
      role="progressbar"
      aria-valuemin="0"
      aria-valuemax="100"
      aria-valuenow="0"
      aria-label="Reading progress"
    ></div>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header" data-pagefind-ignore="all">
      <a class="site-title" href="{{assetPrefix}}">Prompt Library</a>
      <nav class="site-actions" aria-label="Site">
        <a href="{{assetPrefix}}#prompt-library">Catalog</a>
        <a href="{{assetPrefix}}#bibliography">Sources</a>
        <a href="https://github.com/wyattowalsh/prompts/blob/main/{{sourcePath}}">Source</a>
        <pagefind-modal-trigger placeholder="Search"></pagefind-modal-trigger>
      </nav>
    </header>
    <main id="main-content" class="markdown-body site-content" tabindex="-1" {{pagefindBody}}>
      {{content}}
    </main>
    <div id="copy-status" class="visually-hidden" aria-live="polite"></div>
    <pagefind-modal reset-on-close></pagefind-modal>
  </body>
</html>
