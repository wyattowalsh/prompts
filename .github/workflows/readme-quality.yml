name: README Quality

on:
  pull_request:
    paths:
      - README.md
      - AGENTS.md
      - DESIGN.md
      - .agents/skills/readme-catalog-steward/**
      - scripts/check_readme_recipes.py
      - scripts/audit_paste_zone_cells.py
      - scripts/hoist_paste_preview.py
      - scripts/format_recipe_catalog.py
      - scripts/update_readme_badges.py
      - scripts/check_sources_manifest.py
      - scripts/web_analytics_report.mjs
      - scripts/catalog_constants.py
      - scripts/recipe_heading.py
      - scripts/check_badge_urls.sh
      - sources.yaml
      - docs/audit/**
      - LICENSE
      - CONTRIBUTING.md
      - SECURITY.md
      - CODE_OF_CONDUCT.md
      - web/**
      - catalog/**
      - packages/catalog-core/**
      - apps/web/**
      - docs/adr/**
      - docs/catalog-migration/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - pagefind.yml
      - vercel.json
      - eslint.config.js
      - prettier.config.cjs
      - playwright.config.mjs
      - justfile
      - tests/**
      - .pre-commit-config.yaml
      - .gitignore
      - .github/workflows/readme-quality.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - AGENTS.md
      - DESIGN.md
      - .agents/skills/readme-catalog-steward/**
      - scripts/check_readme_recipes.py
      - scripts/audit_paste_zone_cells.py
      - scripts/hoist_paste_preview.py
      - scripts/format_recipe_catalog.py
      - scripts/update_readme_badges.py
      - scripts/check_sources_manifest.py
      - scripts/web_analytics_report.mjs
      - scripts/catalog_constants.py
      - scripts/recipe_heading.py
      - scripts/check_badge_urls.sh
      - sources.yaml
      - docs/audit/**
      - docs/adr/**
      - docs/catalog-migration/**
      - LICENSE
      - CONTRIBUTING.md
      - SECURITY.md
      - CODE_OF_CONDUCT.md
      - web/**
      - catalog/**
      - packages/catalog-core/**
      - apps/web/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - pagefind.yml
      - vercel.json
      - eslint.config.js
      - prettier.config.cjs
      - playwright.config.mjs
      - justfile
      - tests/**
      - .pre-commit-config.yaml
      - .gitignore
      - .github/workflows/readme-quality.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readme-quality:
    name: Markdown, links, badges, sources, and web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
          run_install: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Catalog validate and unit tests
        shell: bash
        run: |
          pnpm catalog:validate
          pnpm catalog:test
          pnpm catalog:fidelity:patterns

      - name: Catalog README drift check
        shell: bash
        run: pnpm catalog:readme:check

      - name: Recipe contract check
        shell: bash
        run: python3 scripts/check_readme_recipes.py --readme README.md --check

      - name: Paste-zone cell audit
        shell: bash
        run: python3 scripts/audit_paste_zone_cells.py --check --strict-warn

      - name: Unit tests
        shell: bash
        run: python3 -m unittest discover -s tests -v

      - name: Source manifest check
        shell: bash
        run: python3 scripts/check_sources_manifest.py --check

      - name: Generated badge check
        shell: bash
        env:
          PYTHONPYCACHEPREFIX: /tmp/prompts-pycache
        run: |
          python3 scripts/update_readme_badges.py --check
          python3 -m py_compile \
            scripts/catalog_constants.py \
            scripts/recipe_heading.py \
            scripts/update_readme_badges.py \
            scripts/check_readme_recipes.py \
            scripts/audit_paste_zone_cells.py \
            scripts/hoist_paste_preview.py \
            scripts/format_recipe_catalog.py \
            scripts/check_sources_manifest.py

      - name: Markdown lint
        shell: bash
        run: |
          DOCS=(
            README.md
            AGENTS.md
            DESIGN.md
            .agents/skills/readme-catalog-steward/SKILL.md
            .agents/skills/readme-catalog-steward/references/*.md
            docs/audit/*.md
          )
          pnpm exec markdownlint-cli2 "${DOCS[@]}"

      - name: Link check
        shell: bash
        run: |
          DOCS=(
            README.md
            AGENTS.md
            DESIGN.md
            .agents/skills/readme-catalog-steward/SKILL.md
            .agents/skills/readme-catalog-steward/references/*.md
            docs/audit/*.md
          )
          pnpm exec markdown-link-check "${DOCS[@]}"

      - name: Skill eval JSON syntax
        shell: bash
        run: |
          python3 -m json.tool .agents/skills/readme-catalog-steward/evals/evals.json >/dev/null
          python3 -m json.tool .agents/skills/readme-catalog-steward/evals/adversarial-fixtures.json >/dev/null

      - name: Workflow and config syntax
        shell: bash
        run: |
          pnpm exec js-yaml .github/workflows/readme-quality.yml >/dev/null
          pnpm exec js-yaml .pre-commit-config.yaml >/dev/null
          python3 -m json.tool vercel.json >/dev/null

      - name: Web lint, unit tests, legacy build, and search index
        shell: bash
        run: |
          pnpm run lint
          pnpm run format:check
          pnpm run web:test
          pnpm run build:legacy

      - name: Catalog React app build
        shell: bash
        run: |
          pnpm catalog:site-data
          pnpm webapp:typecheck
          pnpm webapp:build

      - name: Install Playwright Chromium
        shell: bash
        run: pnpm exec playwright install --with-deps chromium

      - name: Web browser smoke
        shell: bash
        run: pnpm run web:test:browser

      - name: Whitespace check
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          DOCS=(
            README.md
            AGENTS.md
            DESIGN.md
            .agents/skills/readme-catalog-steward/SKILL.md
            .agents/skills/readme-catalog-steward/references/*.md
            docs/audit/*.md
          )
          PATHS=(
            "${DOCS[@]}"
            .agents/skills/readme-catalog-steward/evals/evals.json
            .agents/skills/readme-catalog-steward/evals/adversarial-fixtures.json
            .pre-commit-config.yaml
            .gitignore
            .github/workflows/readme-quality.yml
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            pagefind.yml
            vercel.json
            eslint.config.js
            prettier.config.cjs
            playwright.config.mjs
            justfile
            web
            scripts
            tests
            sources.yaml
            LICENSE
          )
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            git diff --check "${BASE}...HEAD" -- "${PATHS[@]}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "${{ github.event.before }}...HEAD" -- "${PATHS[@]}"
          else
            # Fallback for first push / manual runs: check working tree (clean checkout is a no-op).
            git diff --check -- "${PATHS[@]}"
          fi

      - name: Badge URL smoke check
        shell: bash
        run: bash scripts/check_badge_urls.sh
