name: README Quality

on:
  pull_request:
    paths:
      - README.md
      - AGENTS.md
      - .agents/skills/readme-catalog-steward/**
      - scripts/check_readme_recipes.py
      - scripts/audit_paste_zone_cells.py
      - scripts/hoist_paste_preview.py
      - scripts/update_readme_badges.py
      - tests/**
      - .gitignore
      - .github/workflows/readme-quality.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - AGENTS.md
      - .agents/skills/readme-catalog-steward/**
      - scripts/check_readme_recipes.py
      - scripts/audit_paste_zone_cells.py
      - scripts/hoist_paste_preview.py
      - scripts/update_readme_badges.py
      - tests/**
      - .gitignore
      - .github/workflows/readme-quality.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readme-quality:
    name: Markdown, links, and badges
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Recipe contract check
        shell: bash
        run: python3 scripts/check_readme_recipes.py --readme README.md --check

      - name: Paste-zone cell audit
        shell: bash
        run: python3 scripts/audit_paste_zone_cells.py --check --strict-warn

      - name: Unit tests
        shell: bash
        run: python3 -m unittest discover -s tests -v

      - name: Generated badge check
        shell: bash
        env:
          PYTHONPYCACHEPREFIX: /tmp/prompts-pycache
        run: |
          python3 scripts/update_readme_badges.py --check
          python3 -m py_compile scripts/update_readme_badges.py scripts/check_readme_recipes.py scripts/audit_paste_zone_cells.py scripts/hoist_paste_preview.py

      - name: Markdown lint
        shell: bash
        run: |
          DOCS=(
            README.md
            AGENTS.md
            .agents/skills/readme-catalog-steward/SKILL.md
            .agents/skills/readme-catalog-steward/references/*.md
          )
          npx -y markdownlint-cli2@0.22.1 "${DOCS[@]}"

      - name: Link check
        shell: bash
        run: |
          DOCS=(
            README.md
            AGENTS.md
            .agents/skills/readme-catalog-steward/SKILL.md
            .agents/skills/readme-catalog-steward/references/*.md
          )
          npx -y markdown-link-check@3.14.2 "${DOCS[@]}"

      - name: Skill eval JSON syntax
        run: python3 -m json.tool .agents/skills/readme-catalog-steward/evals/evals.json >/dev/null

      - name: Workflow YAML syntax
        run: npx -y js-yaml@5.2.1 .github/workflows/readme-quality.yml >/dev/null

      - name: Whitespace check
        shell: bash
        run: |
          DOCS=(
            README.md
            AGENTS.md
            .agents/skills/readme-catalog-steward/SKILL.md
            .agents/skills/readme-catalog-steward/references/*.md
          )
          git diff --check -- \
            "${DOCS[@]}" \
            .agents/skills/readme-catalog-steward/evals/evals.json \
            .gitignore \
            .github/workflows/readme-quality.yml \
            scripts/check_readme_recipes.py \
            scripts/update_readme_badges.py \
            scripts/audit_paste_zone_cells.py \
            scripts/hoist_paste_preview.py

      - name: Badge URL smoke check
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t badges < <(python3 scripts/update_readme_badges.py --list-urls)
          if [ "${#badges[@]}" -eq 0 ]; then
            echo "No ShieldCN badge URLs found."
            exit 0
          fi

          for badge in "${badges[@]}"; do
            echo "Checking $badge"
            curl --fail --silent --show-error --location --head --retry 3 --retry-delay 2 "$badge" >/tmp/badge.headers
            if ! grep -iq 'content-type: .*image/svg+xml' /tmp/badge.headers; then
              echo "Expected image/svg+xml for $badge"
              cat /tmp/badge.headers
              exit 1
            fi
          done
