slug: multimodal-evidence-reasoning
title: "Multimodal Evidence Reasoning"
section: reasoning-and-search
order: 110
definition: "combine visual and textual evidence for a source-grounded answer."
best_use: |
  screenshots, charts, tables, diagrams, and image-question answering.
avoid_when: "the model lacks vision support or the image evidence is not needed."
template: |
  Question:
  <input>
  {question}
  </input>
  
  Image or media:
  {image_or_media_reference}
  
  Rules:
  - Identify visible evidence needed for the answer.
  - Do not claim certainty when the image is cropped, blurry, or unavailable.
  - Return the answer with a short evidence summary.
template_omission_reason: null
model_api_controls: |
  image detail setting, multimodal model, OCR/tool support.
cost_latency: "moderate to high."
failure_modes: |
  hallucinated visual details, weak spatial reasoning, missing crop context.
evidence_tier: Moderate
source_type: "primary paper plus official vision docs."
eval_required: true
caveat: "this card avoids public long CoT; it asks for evidence summary."
sources:
  - title: "Multimodal Chain-of-Thought Reasoning"
    url: https://arxiv.org/abs/2302.00923
  - title: "OpenAI text generation"
    url: https://developers.openai.com/api/docs/guides/text
  - title: "Google Gemini prompting strategies"
    url: https://ai.google.dev/gemini-api/docs/prompting-strategies
