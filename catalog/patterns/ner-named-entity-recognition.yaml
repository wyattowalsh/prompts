slug: ner-named-entity-recognition
title: "NER: Named Entity Recognition"
section: task-and-workflow-snippets
order: 20
definition: "extract named entities and assign entity types."
best_use: "entity extraction from clean text with a known schema."
avoid_when: "entity boundaries or types are legally/medically consequential without review."
template: |
  Extract entities from the input.
  
  Entity types:
  {types}
  
  Rules:
  - Preserve exact text spans.
  - Return an empty list if none are present.
  - Do not infer entities absent from the input.
  
  Input:
  <input>
  {text}
  </input>
  
  Output contract:
  {schema}
template_omission_reason: null
model_api_controls: "structured output and exact-span validator."
cost_latency: low.
failure_modes: |
  inferred entities, boundary errors, schema drift.
evidence_tier: Moderate
source_type: "official docs plus survey."
eval_required: true
caveat: "entity boundaries and types are corpus-specific."
sources:
  - title: "Google Gemini prompting strategies"
    url: https://ai.google.dev/gemini-api/docs/prompting-strategies
  - title: "The Prompt Report"
    url: https://arxiv.org/abs/2406.06608
