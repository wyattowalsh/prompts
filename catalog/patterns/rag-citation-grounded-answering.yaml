slug: rag-citation-grounded-answering
title: "RAG / Citation-Grounded Answering"
section: core-prompt-construction
order: 100
definition: |
  answer from retrieved or provided sources with source IDs, citation checks, and missing-evidence behavior.
best_use: |
  current facts, private documents, research synthesis, support answers, and compliance-sensitive summaries.
avoid_when: "retrieval quality is unknown and no review path exists."
template: |
  Question:
  {question}
  
  Sources:
  <sources>
  {source_id: excerpt or document chunk}
  </sources>
  
  Rules:
  - Use only the sources above unless reliable general knowledge is explicitly allowed.
  - Cite source IDs for each factual claim.
  - Separate source facts from inference.
  - Preserve disagreements and uncertainty.
  - If evidence is missing, say what is missing.
  
  Output:
  - answer
  - citations
  - unresolved gaps
template_omission_reason: null
model_api_controls: |
  retrieval query, source ranking, grounding metadata, provider citation controls, citation validator, context budget.
cost_latency: "moderate to high."
failure_modes: |
  retrieval miss, source poisoning, citation mismatch, unverified generated citations, lost middle effects.
evidence_tier: "**Strong** for the retrieval-grounded architecture, **Moderate** for any exact prompt."
source_type: "primary paper, RAG evaluation survey, plus official grounding and citation docs."
eval_required: true
caveat: "citations must be checked against source text; model-generated citations can be wrong."
sources:
  - title: "Retrieval-Augmented Generation"
    url: https://arxiv.org/abs/2005.11401
  - title: "Lost in the Middle"
    url: https://arxiv.org/abs/2307.03172
